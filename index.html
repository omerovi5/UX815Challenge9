<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dribble – Search: landing page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="screen.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: { xl2: '12px' }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-gray-900">

<div class="max-w-6xl mx-auto px-6 py-0">

  <!-- ── Filter bar ── -->
  <div class="flex items-center gap-2 py-5 border-b border-gray-200 mb-7 flex-wrap">

    <!-- Popular dropdown -->
    <button class="flex items-center gap-1.5 border border-gray-300 rounded-full px-4 py-1.5 text-sm font-medium text-gray-800 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap">
      Popular <i class="bi bi-chevron-down text-xs"></i>
    </button>

    <!-- Category tabs -->
    <nav class="flex items-center gap-0.5 flex-1 overflow-hidden">
      <button class="filter-tab-active px-3 py-1.5 text-sm rounded-full hover:bg-gray-100 transition-colors whitespace-nowrap">Discover</button>
      <button class="px-3 py-1.5 text-sm text-gray-500 font-medium rounded-full hover:bg-gray-100 hover:text-gray-900 transition-colors whitespace-nowrap">Animation</button>
      <button class="px-3 py-1.5 text-sm text-gray-500 font-medium rounded-full hover:bg-gray-100 hover:text-gray-900 transition-colors whitespace-nowrap">Branding</button>
      <button class="px-3 py-1.5 text-sm text-gray-500 font-medium rounded-full hover:bg-gray-100 hover:text-gray-900 transition-colors whitespace-nowrap">Illustration</button>
      <button class="px-3 py-1.5 text-sm text-gray-500 font-medium rounded-full hover:bg-gray-100 hover:text-gray-900 transition-colors whitespace-nowrap">Mobile</button>
      <button class="px-3 py-1.5 text-sm text-gray-500 font-medium rounded-full hover:bg-gray-100 hover:text-gray-900 transition-colors whitespace-nowrap">Print</button>
      <button class="px-3 py-1.5 text-sm text-gray-500 font-medium rounded-full hover:bg-gray-100 hover:text-gray-900 transition-colors">
        <i class="bi bi-chevron-right text-xs"></i>
      </button>
    </nav>

    <!-- Filters button -->
    <button class="flex items-center gap-1.5 border border-gray-300 rounded-full px-4 py-1.5 text-sm font-medium text-gray-800 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap ml-auto">
      <i class="bi bi-sliders text-sm"></i> Filters
    </button>

  </div>

  <!-- ── Shot grid — 3 columns ── -->
  <div class="grid grid-cols-3 gap-6">

    <!-- ══ ROW 1 ══ -->

    <!-- Card 1 · Siege Media — beige, blue sketch icons 3×3 -->
    <div>
      <div class="shot-thumb">
        <div class="thumb-inner canvas-beige">
          <div class="icon-grid icon-grid-3x3 w-full h-full">
            <!-- Row 1: presentation, scales, dice -->
            <i class="bi bi-bar-chart-line icon-blue"></i>
            <i class="bi bi-bank2 icon-blue"></i>
            <i class="bi bi-dice-3 icon-blue"></i>
            <!-- Row 2: money bag, hammer, globe hand -->
            <i class="bi bi-bag icon-blue"></i>
            <i class="bi bi-tools icon-blue"></i>
            <i class="bi bi-globe2 icon-blue"></i>
            <!-- Row 3: handshake, calendar, megaphone -->
            <i class="bi bi-handshake icon-blue"></i>
            <i class="bi bi-calendar3 icon-blue"></i>
            <i class="bi bi-megaphone icon-blue"></i>
          </div>
        </div>
        <div class="shot-overlay"></div>
      </div>
      <!-- Author -->
      <div class="flex items-center gap-2 mt-2.5">
        <div class="author-avatar text-[9px]" style="background:#c0392b; letter-spacing:-0.5px;">sm</div>
        <span class="text-sm font-medium text-gray-800 truncate">Siege Media</span>
        <span class="badge-team">TEAM</span>
        <div class="flex items-center gap-3 ml-auto shrink-0">
          <span class="stat"><i class="bi bi-heart"></i> 193</span>
          <span class="stat"><i class="bi bi-eye"></i> 67.4k</span>
        </div>
      </div>
    </div>

    <!-- Card 2 · Orman Clark — dark bg, dense white icon grid -->
    <div>
      <div class="shot-thumb">
        <div class="thumb-inner canvas-black">
          <div class="icon-grid icon-grid-8col w-full h-full">
            <i class="bi bi-type-h1 icon-dark"></i>
            <i class="bi bi-type-h2 icon-dark"></i>
            <i class="bi bi-fonts icon-dark"></i>
            <i class="bi bi-type-bold icon-dark"></i>
            <i class="bi bi-type-italic icon-dark"></i>
            <i class="bi bi-type-underline icon-dark"></i>
            <i class="bi bi-link45deg icon-dark"></i>
            <i class="bi bi-image icon-dark"></i>

            <i class="bi bi-list-ul icon-dark"></i>
            <i class="bi bi-list-ol icon-dark"></i>
            <i class="bi bi-code-slash icon-dark"></i>
            <i class="bi bi-blockquote-left icon-dark"></i>
            <i class="bi bi-table icon-dark"></i>
            <i class="bi bi-grid-3x3 icon-dark"></i>
            <i class="bi bi-layout-split icon-dark"></i>
            <i class="bi bi-columns-gap icon-dark"></i>

            <i class="bi bi-mic icon-dark"></i>
            <i class="bi bi-camera-video icon-dark"></i>
            <i class="bi bi-film icon-dark"></i>
            <i class="bi bi-music-note icon-dark"></i>
            <i class="bi bi-file-earmark-text icon-dark"></i>
            <i class="bi bi-file-earmark-pdf icon-dark"></i>
            <i class="bi bi-folder2 icon-dark"></i>
            <i class="bi bi-archive icon-dark"></i>

            <i class="bi bi-search icon-dark"></i>
            <i class="bi bi-sliders icon-dark"></i>
            <i class="bi bi-funnel icon-dark"></i>
            <i class="bi bi-sort-down icon-dark"></i>
            <i class="bi bi-bell icon-dark"></i>
            <i class="bi bi-gear icon-dark"></i>
            <i class="bi bi-lock icon-dark"></i>
            <i class="bi bi-shield-check icon-dark"></i>

            <i class="bi bi-person icon-dark"></i>
            <i class="bi bi-people icon-dark"></i>
            <i class="bi bi-envelope icon-dark"></i>
            <i class="bi bi-chat-dots icon-dark"></i>
            <i class="bi bi-calendar3 icon-dark"></i>
            <i class="bi bi-clock icon-dark"></i>
            <i class="bi bi-star icon-dark"></i>
            <i class="bi bi-bookmark icon-dark"></i>

            <i class="bi bi-tag icon-dark"></i>
            <i class="bi bi-share icon-dark"></i>
            <i class="bi bi-clipboard icon-dark"></i>
            <i class="bi bi-pencil icon-dark"></i>
            <i class="bi bi-trash icon-dark"></i>
            <i class="bi bi-arrow-repeat icon-dark"></i>
            <i class="bi bi-check2 icon-dark"></i>
            <i class="bi bi-x-lg icon-dark"></i>
          </div>
        </div>
        <div class="shot-overlay"></div>
      </div>
      <div class="flex items-center gap-2 mt-2.5">
        <img src="https://i.pravatar.cc/28?img=12" alt="" class="w-7 h-7 rounded-full object-cover shrink-0">
        <span class="text-sm font-medium text-gray-800 truncate">Orman Clark</span>
        <span class="badge-pro">PRO</span>
        <div class="flex items-center gap-3 ml-auto shrink-0">
          <span class="stat"><i class="bi bi-heart"></i> 98</span>
          <span class="stat"><i class="bi bi-eye"></i> 24.2k</span>
        </div>
      </div>
    </div>

    <!-- Card 3 · Jordon Cheung — off-white, gray outline icons 5×4 -->
    <div>
      <div class="shot-thumb">
        <div class="thumb-inner canvas-offwhite">
          <div class="icon-grid icon-grid-5col w-full h-full">
            <i class="bi bi-diagram-3 icon-gray"></i>
            <i class="bi bi-grid-1x2 icon-gray"></i>
            <i class="bi bi-bezier2 icon-gray"></i>
            <i class="bi bi-calendar4 icon-gray"></i>
            <i class="bi bi-gear-wide icon-gray"></i>

            <i class="bi bi-cloud-download icon-gray"></i>
            <i class="bi bi-file-earmark-bar-graph icon-gray"></i>
            <i class="bi bi-eyedropper icon-gray"></i>
            <i class="bi bi-lock icon-gray"></i>
            <i class="bi bi-pin-map icon-gray"></i>

            <i class="bi bi-floppy icon-gray"></i>
            <i class="bi bi-sliders2 icon-gray"></i>
            <i class="bi bi-shield-half icon-gray"></i>
            <i class="bi bi-chat-dots icon-gray"></i>
            <i class="bi bi-card-image icon-gray"></i>

            <i class="bi bi-diagram-2 icon-gray"></i>
            <i class="bi bi-briefcase icon-gray"></i>
            <i class="bi bi-graph-up icon-gray"></i>
            <i class="bi bi-arrow-left-right icon-gray"></i>
            <i class="bi bi-bar-chart-steps icon-gray"></i>
          </div>
        </div>
        <div class="shot-overlay"></div>
      </div>
      <div class="flex items-center gap-2 mt-2.5">
        <img src="https://i.pravatar.cc/28?img=47" alt="" class="w-7 h-7 rounded-full object-cover shrink-0">
        <span class="text-sm font-medium text-gray-800 truncate">Jordon Cheung</span>
        <div class="flex items-center gap-3 ml-auto shrink-0">
          <span class="stat"><i class="bi bi-heart"></i> 176</span>
          <span class="stat"><i class="bi bi-eye"></i> 57.1k</span>
        </div>
      </div>
    </div>

    <!-- ══ ROW 2 ══ -->

    <!-- Card 4 · Aldo Crusher — beige, purple 3D-style icons 3×3 -->
    <div>
      <div class="shot-thumb">
        <div class="thumb-inner canvas-beige">
          <div class="icon-grid icon-grid-3x3 w-full h-full">
            <i class="bi bi-camera-fill icon-purple"></i>
            <i class="bi bi-person-fill icon-purple"></i>
            <i class="bi bi-box-fill icon-purple"></i>
            <i class="bi bi-key-fill icon-purple"></i>
            <i class="bi bi-stars icon-purple"></i>
            <i class="bi bi-heart-fill icon-purple"></i>
            <i class="bi bi-moon-stars-fill icon-purple"></i>
            <i class="bi bi-gem icon-purple"></i>
            <i class="bi bi-eye-fill icon-purple"></i>
          </div>
        </div>
        <div class="shot-overlay"></div>
      </div>
      <div class="flex items-center gap-2 mt-2.5">
        <img src="https://i.pravatar.cc/28?img=32" alt="" class="w-7 h-7 rounded-full object-cover shrink-0">
        <span class="text-sm font-medium text-gray-800 truncate">Aldo Crusher</span>
        <span class="badge-pro">PRO</span>
        <div class="flex items-center gap-3 ml-auto shrink-0">
          <span class="stat"><i class="bi bi-heart"></i> 65</span>
          <span class="stat"><i class="bi bi-eye"></i> 6.7k</span>
        </div>
      </div>
    </div>

    <!-- Card 5 · Canto — orange ad card -->
    <div>
      <div class="shot-thumb">
        <div class="thumb-inner canvas-orange"></div>
        <!-- always-visible external link button -->
        <div class="overlay-actions-always">
          <button class="overlay-btn"><i class="bi bi-box-arrow-up-right"></i></button>
        </div>
      </div>
      <div class="flex items-center gap-2 mt-2.5">
        <div class="author-avatar" style="background:#f0a500; border:1.5px solid #ddd;">
          <i class="bi bi-c-circle-fill text-white" style="font-size:15px;"></i>
        </div>
        <span class="text-sm font-medium text-gray-800">Canto</span>
        <div class="ml-auto shrink-0">
          <span class="text-xs text-gray-400">
            <a href="#" class="hover:text-gray-600 transition-colors">Hide ads</a>
            &bull;
            <a href="#" class="hover:text-gray-600 transition-colors">Advertise</a>
          </span>
        </div>
      </div>
    </div>

    <!-- Card 6 · Ramy Wafaa — tan, green illustration figures + hover overlay -->
    <div>
      <div class="shot-thumb">
        <div class="thumb-inner canvas-tan">
          <div class="illus-grid">
            <div class="illus-figure">🧑‍🎨</div>
            <div class="illus-figure">🤸</div>
            <div class="illus-figure">👩‍💻</div>
            <div class="illus-figure">🐱</div>
            <div class="illus-figure">🌿</div>
            <div class="illus-figure">🦋</div>
          </div>
        </div>
        <!-- Hover: dark overlay + slide-up title -->
        <div class="shot-overlay">
          <span class="overlay-title">ilcons / mini illustr...</span>
        </div>
        <!-- Hover: bookmark + heart buttons -->
        <div class="overlay-actions">
          <button class="overlay-btn"><i class="bi bi-bookmark"></i></button>
          <button class="overlay-btn"><i class="bi bi-heart"></i></button>
        </div>
      </div>
      <div class="flex items-center gap-2 mt-2.5">
        <img src="https://i.pravatar.cc/28?img=58" alt="" class="w-7 h-7 rounded-full object-cover shrink-0">
        <span class="text-sm font-medium text-gray-800 truncate">Ramy Wafaa</span>
        <span class="badge-pro">PRO</span>
        <div class="flex items-center gap-3 ml-auto shrink-0">
          <span class="stat"><i class="bi bi-heart"></i> 513</span>
          <span class="stat"><i class="bi bi-eye"></i> 143k</span>
        </div>
      </div>
    </div>

  </div><!-- /grid -->
</div><!-- /container -->

</body>
</html>
